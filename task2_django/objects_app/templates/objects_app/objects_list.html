<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Объекты API</title>
    <!-- jQuery через CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            color: #2c3e50;
        }

        /* Кнопка обновления */
        #refresh-btn {
            display: block;
            margin: 0 auto 25px auto;
            padding: 10px 28px;
            font-size: 16px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #refresh-btn:hover {
            background: #2980b9;
        }

        /* Контейнер таблицы с горизонтальной прокруткой */
        .table-container {
            max-width: 1100px;
            margin: 0 auto;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        thead th {
            background: #2c3e50;
            color: #fff;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            font-size: 15px;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #e0e0e0;
            transition: background 0.2s;
        }

        tbody tr:hover {
            background: #f5f7fa;
        }

        tbody td {
            padding: 12px 16px;
            font-size: 14px;
            vertical-align: top;
        }

        /* Ячейка с вложенными данными */
        .data-cell {
            white-space: pre-wrap;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: #555;
        }

        /* Сообщение при отсутствии данных */
        .no-data {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #999;
        }

        /* Анимация загрузки */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #3498db;
        }

        /* Подсветка строки при клике */
        .highlighted {
            background: #e8f4fd !important;
        }
    </style>
</head>
<body>

    <h1>Список предметов</h1>
    <button id="refresh-btn">Обновить данные</button>

    <div class="table-container">
        <table id="objects-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название</th>
                    <th>Данные</th>
                </tr>
            </thead>
            <tbody>
                {% if objects %}
                    {% for obj in objects %}
                    <tr>
                        <td>{{ obj.id }}</td>
                        <td>{{ obj.name }}</td>
                        <td class="data-cell">
                            {% if obj.data %}
                                {% for key, value in obj.data.items %}
{{ key }}: {{ value }}
                                {% endfor %}
                            {% else %}
                                —
                            {% endif %}
                        </td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="3" class="no-data">Нет данных для отображения</td>
                    </tr>
                {% endif %}
            </tbody>
        </table>
    </div>

    <script>
        // jQuery: подсветка строки при клике
        $(document).on('click', '#objects-table tbody tr', function() {
            $(this).toggleClass('highlighted');
        });

        // jQuery: кнопка обновления — перезагружает страницу
        $('#refresh-btn').on('click', function() {
            location.reload();
        });
    </script>

</body>
</html>
